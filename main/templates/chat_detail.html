<style>
.chat-container {
    max-width: 600px;
    margin: auto;
    height: 80vh;
    display: flex;
    flex-direction: column;
}
.messages {
    flex: 1;
    overflow-y: auto;
}
.msg {
    padding: 10px;
    margin: 6px;
    border-radius: 12px;
    max-width: 70%;
}
.sent {
    background: #3797f0;
    color: white;
    margin-left: auto;
}
.received {
    background: #262626;
    color: white;
}
.input-box {
    display: flex;
}
input {
    flex: 1;
    padding: 10px;
}
</style>

<div class="chat-container">
    <div class="messages" id="messages">
        {% for msg in messages %}
            <div class="msg {% if msg.sender == request.user %}sent{% else %}received{% endif %}">
                {{ msg.text }}
            </div>
        {% endfor %}
    </div>

    <div class="input-box">
        <input id="messageInput" placeholder="Message..." onkeydown="if(event.key==='Enter'){event.preventDefault();sendMessage();}" />
        <button type="button" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
const roomId = "{{ chat.id }}";
const username = "{{ request.user.username }}";
const socket = new WebSocket(
    (window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host + '/ws/chat/' + roomId + '/'
);

function appendMessage(text, sent) {
    const div = document.createElement('div');
    div.className = 'msg ' + (sent ? 'sent' : 'received');
    div.innerText = text;
    document.getElementById('messages').appendChild(div);
    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
}

socket.onmessage = function(e) {
    const data = JSON.parse(e.data);
    appendMessage(data.message, data.username === username);
};

function sendMessage() {
    const input = document.getElementById('messageInput');
    if (!input.value.trim()) return;
    socket.send(JSON.stringify({
        'message': input.value
    }));
    appendMessage(input.value, true);
    input.value = '';
}

// Auto-scroll to bottom on load
window.onload = function() {
    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
};
</script>
